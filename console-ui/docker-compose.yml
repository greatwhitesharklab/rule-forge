version: '3.8'

services:
  # RuleForge Console UI 前端服务
  ruleforge-console-ui:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_VERSION: ${BUILD_VERSION:-dev}
        BUILD_COMMIT: ${BUILD_COMMIT:-unknown}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    image: ruleforge-console-ui:${BUILD_VERSION:-latest}
    container_name: ruleforge-console-ui
    ports:
      - "${CONSOLE_PORT:-8080}:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - ruleforge-network

networks:
  ruleforge-network:
    driver: bridge

# 使用示例:
#
# 1. 基础使用（默认配置）
#    docker-compose up -d
#
# 2. 自定义端口
#    CONSOLE_PORT=3000 docker-compose up -d
#
# 3. 构建并运行
#    docker-compose up -d --build
#
# 4. 查看日志
#    docker-compose logs -f ruleforge-console-ui
#
# 5. 停止服务
#    docker-compose down
