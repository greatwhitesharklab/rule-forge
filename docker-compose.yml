# RuleForge 全栈部署配置
# 使用方式: docker compose up
# 访问地址: http://localhost (Console UI)
#
# 启动加速原则:
# - JVM 解释执行优先(JIT 后台异步),首屏更快
# - MySQL 关掉一切 dev 用不上的特性(perf schema / binlog / DNS 反解)
# - 显式 depends_on + service_healthy,容器按"业务就绪"顺序起来,不等空进程
# - init: true 让容器 PID 1 走 tini,信号处理正确,关闭更快

services:
  # ================================
  # MySQL 数据库
  # ================================
  mysql:
    image: mysql:8.0
    container_name: ruleforge-mysql
    init: true
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-ruleforge}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/init-sql:/docker-entrypoint-initdb.d
    # 启动加速:
    #   --skip-name-resolve         关 client DNS 反解,容器连 MySQL 每次握手省 ~5-50ms
    #   --innodb-buffer-pool-size   显式指定 buffer pool,免去启动期探测 host RAM
    #   --innodb-flush-log-at-trx-commit=2  dev 模式可接受的小延迟换吞吐;生产去掉
    #   --skip-log-bin              dev 不需要 binlog,关掉省 init + 写入开销
    #   --performance-schema=OFF    关 perf schema,启动期省 ~500ms(无监控诉求)
    command:
      - --skip-name-resolve
      - --innodb-buffer-pool-size=512M
      - --innodb-flush-log-at-trx-commit=2
      - --skip-log-bin
      - --performance-schema=OFF
    healthcheck:
      # mysqladmin ping 本身就快 (~50ms)。interval 2s 让 console 尽快能连上 mysql。
      # start_period 给 init SQL 跑完 30s 缓冲(冷启动 + 3 个数据库 init),
      # retries 5 = 10s 总等待。
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-ruleforge}"]
      interval: 2s
      timeout: 2s
      retries: 5
      start_period: 30s
    networks:
      - ruleforge

  # ================================
  # Console App — 编辑器后端 (端口 8180)
  # ================================
  console-app:
    build:
      context: ./server
      dockerfile: Dockerfile.console
    container_name: ruleforge-console
    init: true
    environment:
      CONSOLE_PORT: "8180"
      SERVER_PORT: "8180"
      APP_DB_URL: jdbc:mysql://mysql:3306/ruleforge_app_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true
      APP_DB_USERNAME: root
      APP_DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-ruleforge}
      RF_DB_URL: jdbc:mysql://mysql:3306/ruleforge_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true
      RF_DB_USERNAME: root
      RF_DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-ruleforge}
      EXECUTOR_URL: http://executor-app:8280
      RF_REPO_DIR: /app/data/riskruleforge
      # V5.9.x: Git-first 存储 — 注入 GitConfig.base 路径。容器里用 /app/data/git
      # (跟 repository.dir 同根,走 console_data volume 持久化)
      GIT_BASE: /app/data/git
      # Phase 8: ClickHouse 分析存储
      CH_DB_URL: jdbc:clickhouse://clickhouse:8123/ruleforge_analytics
      CH_DB_USERNAME: default
      CH_DB_PASSWORD: changeme
      CH_ANALYTICS_ENABLED: "true"
      # JVM 启动加速:
      #   -XX:TieredStopAtLevel=1        跳过 C2 JIT,首次请求走解释执行,JIT 后台异步发生(冷启动省 1-3s)
      #   -XX:+ExitOnOutOfMemoryError    OOM 时容器立即退出而非苟活,配合 restart policy 起新实例
      JAVA_OPTS: "-Xmx2048m -Xms512m -XX:+UseG1GC -XX:+UseContainerSupport -XX:TieredStopAtLevel=1 -XX:+ExitOnOutOfMemoryError"
    volumes:
      - console_data:/app/data
      - console_logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    # 本地 Playwright E2E 用 — vite dev proxy 走 127.0.0.1:8180
    ports:
      - "${CONSOLE_PORT:-8180}:8180"
    networks:
      - ruleforge

  # ================================
  # Executor App — 规则执行器 (端口 8280)
  # ================================
  executor-app:
    build:
      context: ./server
      dockerfile: Dockerfile.executor
    container_name: ruleforge-executor
    init: true
    environment:
      EXECUTOR_PORT: "8280"
      SERVER_PORT: "8280"
      RF_DB_URL: jdbc:mysql://mysql:3306/ruleforge_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true
      RF_DB_USERNAME: root
      RF_DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-ruleforge}
      CONSOLE_URL: http://console-app:8180
      # Phase 8: ClickHouse 分析存储 (双写)
      CH_DB_URL: jdbc:clickhouse://clickhouse:8123/ruleforge_analytics
      CH_DB_USERNAME: default
      CH_DB_PASSWORD: changeme
      CH_ANALYTICS_ENABLED: "true"
      JAVA_OPTS: "-Xmx1024m -Xms256m -XX:+UseG1GC -XX:+UseContainerSupport -XX:TieredStopAtLevel=1 -XX:+ExitOnOutOfMemoryError"
    volumes:
      - executor_logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
    # 本地 Playwright E2E 用
    ports:
      - "${EXECUTOR_PORT:-8280}:8280"
    networks:
      - ruleforge

  # ================================
  # ClickHouse — OLAP 分析存储 (端口 8123)
  # ================================
  clickhouse:
    image: clickhouse/clickhouse-server:26.5
    container_name: ruleforge-clickhouse
    init: true
    environment:
      CLICKHOUSE_DB: ruleforge_analytics
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: changeme
    ports:
      - "${CH_PORT:-8123}:8123"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    networks:
      - ruleforge
    healthcheck:
      test: ["CMD", "clickhouse-client", "--user", "default", "--password", "changeme", "--query", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  # ================================
  # Model Service — ML 模型推理服务 (端口 8501)
  # ================================
  model-service:
    build:
      context: ./model-service
      dockerfile: Dockerfile
    container_name: ruleforge-model-service
    init: true
    environment:
      PORT: "8501"
      LOG_LEVEL: INFO
    volumes:
      - model_data:/app/models
    networks:
      - ruleforge

  # ================================
  # Console UI — 前端可视化界面 (端口 80)
  # ================================
  console-ui:
    build:
      context: ./console-ui
      dockerfile: Dockerfile
    container_name: ruleforge-console-ui
    init: true
    ports:
      - "${CONSOLE_UI_PORT:-80}:80"
    # 等 console-app 的 healthcheck(/actuator/health)通过再起 nginx,
    # 避免首屏用户在 console Spring Boot 还在初始化时撞 502。
    # console-app 的 HEALTHCHECK 写在 Dockerfile.console(start-period 30s,interval 15s)
    depends_on:
      console-app:
        condition: service_healthy
    networks:
      - ruleforge

  # ================================
  # Rust 状态库 (Phase 6) — Postgres for rust-ruleforge
  # 跟 Java mysql 平行,Rust 自己的 rust_decision_flow_state 表;
  # 5433 端口留给 dev 直连 (避开 Java 将来可能迁 pg 的 5432)
  # ================================
  postgres-rust:
    image: postgres:16-alpine
    container_name: ruleforge-postgres-rust
    environment:
      POSTGRES_USER: ruleforge
      POSTGRES_PASSWORD: ruleforge
      POSTGRES_DB: ruleforge_rust
    ports:
      - "5433:5432"
    volumes:
      - postgres_rust_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ruleforge -d ruleforge_rust"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - ruleforge

  # ================================
  # Rust 流程执行器 (V5.27) — `rf-http` binary
  # 跟 Java executor-app 平行,挂同一份 knowledge 目录 + console-app
  # 8082/8281: HTTP_PORT 默认 8281,跟 Java executor 的 8280 区分
  # KNOWLEDGE_DIR: 挂进容器的 knowledge dir,空时降级到 MockRuleEngine
  # ================================
  rust-flow:
    build:
      # Build context = workspace root. The Dockerfile at
      # experiments/server-rust/Dockerfile copies Cargo.toml /
      # Cargo.lock from the root and the `crates/` tree, so
      # the build path needs both. Setting the context to
      # ./experiments/server-rust would break the COPY
      # statements (they expect to see `Cargo.toml` in CWD).
      context: .
      dockerfile: experiments/server-rust/Dockerfile
    container_name: ruleforge-rust-flow
    init: true
    environment:
      # 跟 Java executor 同样的 CONSOLE_URL — Rust 走 HTTP 拉 BPMN
      CONSOLE_URL: http://console-app:8180
      # Postgres for the rust state store. 容器内 5432 是 postgres-rust 的监听端口
      PG_URL: postgres://ruleforge:ruleforge@postgres-rust:5432/ruleforge_rust
      # Knowledge dir — 跟 console-app 的 RF_REPO_DIR 同源
      # (Java console 导出 *.json 到该目录,Rust binary 启动时 load)
      # 留空时降级到 MockRuleEngine(Phase 4 桩),不阻断启动
      #
      # 为什么用 /app/data/riskruleforge 而不是 /knowledge:
      # console-app 把 RF_REPO_DIR 设在 /app/data/riskruleforge
      # (一个子目录),它写出的 *.json 都在这里;直接 mount 同名
      # volume 进 /app/data,再把 KNOWLEDGE_DIR 指向子路径,Rust
      # 就能读到 console 实时导出的知识包 — 不需要另起 volume copy
      # step。空目录(还没在 console 里 save 任何 rule)时 binary
      # 降级到 MockRuleEngine,容器照常起。
      KNOWLEDGE_DIR: /app/data/riskruleforge
      # Worker ID for the recovery loop (Phase 6).
      WORKER_ID: rust-flow-1
      # 30s sweep 间隔,跟 Java executor 对齐
      RECOVERY_INTERVAL_SECS: "30"
      # Rust log filter (RUST_LOG syntax)
      RUST_LOG: info,rf_http=debug,rf_executor=debug,rf_state=debug
    volumes:
      # Knowledge 目录 — 跟 console-app 的 console_data 同 volume,
      # 容器内路径是 /app/data,与 Java console 的 RF_REPO_DIR 子路径对齐
      - console_data:/app/data
      - rust_flow_logs:/app/logs
    depends_on:
      console-app:
        condition: service_healthy
      postgres-rust:
        condition: service_healthy
    # 本地 Playwright E2E 用 — 跟 Java executor(8280)区分,避免端口冲突
    ports:
      - "${RUST_FLOW_PORT:-8281}:8281"
    healthcheck:
      # 容器起来了但 rf-http 还在加载 knowledge / 连 postgres / migrate
      # 所以 start_period 给 30s 缓冲。失败阈值 3 次 = 9s 后报 unhealthy
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8281/health"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 30s
    networks:
      - ruleforge

# ================================
# 持久化卷
# ================================
volumes:
  mysql_data:
    driver: local
  console_data:
    driver: local
  console_logs:
    driver: local
  executor_logs:
    driver: local
  model_data:
    driver: local
  clickhouse_data:
    driver: local
  postgres_rust_data:
    driver: local
  rust_flow_logs:
    driver: local

# ================================
# 网络
# ================================
networks:
  ruleforge:
    driver: bridge
