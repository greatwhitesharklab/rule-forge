server:
  port: ${CONSOLE_PORT:8180}

spring:
  main:
    allow-circular-references: true
    # 启动加速:关掉 banner 解析打印 + JMX 注册,各省 ~100-300ms
    banner-mode: off
  jmx:
    enabled: false
  application:
    name: ruleforge-console
  datasource:
    app:
      jdbcUrl: ${APP_DB_URL:jdbc:mysql://localhost:3306/app_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true}
      username: ${APP_DB_USERNAME:root}
      password: ${APP_DB_PASSWORD:}
      driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        maximum-pool-size: 10
        minimum-idle: 2
        connection-timeout: 60000
        idle-timeout: 300000
        max-lifetime: 1200000
        leak-detection-threshold: 30000
        validation-timeout: 3000
        connection-test-query: SELECT 1
        pool-name: AppCloudSqlCP
    ruleforge:
      jdbcUrl: ${RF_DB_URL:jdbc:mysql://localhost:3306/ruleforge_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true}
      username: ${RF_DB_USERNAME:root}
      password: ${RF_DB_PASSWORD:}
      driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        maximum-pool-size: 10
        minimum-idle: 2
        connection-timeout: 60000
        idle-timeout: 300000
        max-lifetime: 1200000
        leak-detection-threshold: 30000
        validation-timeout: 3000
        connection-test-query: SELECT 1
        pool-name: UruleCloudSqlCP
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

ruleforge:
  knowledgeUpdateCycleV2: 300
  isKnowledgeUpdateRemoteV2: false
  approval:
    mode: ${APPROVAL_MODE:auto}
  repository:
    dir: ${RF_REPO_DIR:./data/riskruleforge}
  exec:
    url: ${EXECUTOR_URL:http://localhost:8280}
  git:
    base: ${GIT_BASE:/opt/data}
    remote-url: ${GIT_REMOTE_URL:}
  monitoring:
    aggregation-interval-ms: ${MONITORING_AGGREGATION_INTERVAL:60000}
    alert-webhook-timeout-ms: ${MONITORING_WEBHOOK_TIMEOUT:5000}
    retention-days: ${MONITORING_RETENTION_DAYS:30}

# 延迟加载配置
lazy-load:
  enabled: true
  base-url: ${LAZY_LOAD_BASE_URL:}
  timeout: 5000

# Agent (AI 助手) 配置
agent:
  enabled: ${AGENT_ENABLED:false}
  llm:
    base-url: ${LLM_BASE_URL:https://api.openai.com/v1}
    api-key: ${LLM_API_KEY:}
    model: ${LLM_MODEL:gpt-4o}
    max-tokens: ${LLM_MAX_TOKENS:4096}
    temperature: ${LLM_TEMPERATURE:0.7}

logging:
  file:
    name: ${LOG_FILE:/tmp/ruleforge-console.log}
  level:
    root: INFO
    com.ruleforge: DEBUG
    org.springframework.jdbc: DEBUG
    com.zaxxer.hikari: DEBUG

# Actuator — /actuator/health 给 docker HEALTHCHECK 探活,prometheus 给
# Phase 1 监控(详见 CHANGELOG 5.0.0)暴露指标
management:
  endpoints:
    web:
      exposure:
        # 显式列出: health 给容器探活,info/metrics/prometheus 给运维面板
        include: health,info,metrics,prometheus
  endpoint:
    health:
      # dev 模式直接展示子组件状态方便排查;生产建议 when-authorized
      show-details: always
      probes:
        enabled: true   # 启用 /actuator/health/liveness 和 /readiness(K8s 风格)
  health:
    db:
      enabled: true    # 检查 HikariCP 能不能拿到连接
    diskspace:
      enabled: true
  info:
    env:
      enabled: true    # /actuator/info 暴露 build/git/env 信息
