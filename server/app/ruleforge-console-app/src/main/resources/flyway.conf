# Flyway Configuration for RuleForge Console
flyway.url=jdbc:mysql://localhost:3306/ruleforge_console?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
flyway.user=root
flyway.password=password
flyway.driver=com.mysql.cj.jdbc.Driver

# Migration settings
flyway.locations=classpath:db/migration
flyway.baselineOnMigrate=true
flyway.baselineVersion=3.0.0
flyway.baselineDescription=Base version for RuleForge Console
flyway.validateOnMigrate=false
flyway.outOfOrder=false

# Table settings
flyway.table=flyway_schema_history
flyway.cleanDisabled=true

# SQL settings
flyway.sqlMigrationPrefix=V
flyway.sqlMigrationSeparator=__
flyway.sqlMigrationSuffixes=.sql

# Encoding
flyway.encoding=UTF-8