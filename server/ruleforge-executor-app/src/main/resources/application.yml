server:
  port: ${EXECUTOR_PORT:8280}

spring:
  main:
    allow-circular-references: true
    # 启动加速:关掉 banner 解析打印 + JMX 注册,各省 ~100-300ms
    banner-mode: off
  jmx:
    enabled: false
  application:
    name: ruleforge-executor
  datasource:
    ruleforge:
      jdbcUrl: ${RF_DB_URL:jdbc:mysql://192.168.3.36:3306/ruleforge_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true}
      username: ${RF_DB_USERNAME:root}
      password: ${RF_DB_PASSWORD:}
      driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        maximum-pool-size: 10
        minimum-idle: 2
        connection-timeout: 60000
        idle-timeout: 300000
        max-lifetime: 1200000
        leak-detection-threshold: 30000
        validation-timeout: 3000
        connection-test-query: SELECT 1
        pool-name: ExecutorCloudSqlCP

ruleforge:
  knowledgeUpdateCycleV2: 300
  isKnowledgeUpdateRemoteV2: true
  console:
    url: ${CONSOLE_URL:http://localhost:8180}
  flow:
    # V5.20+: 自建决策流执行器引擎。=custom 走自建 FlowEngine,=legacy 走 Flowable。
    # Commit 3 翻 default=custom;紧急回滚设 FLOW_EXECUTOR_ENGINE=legacy。
    executor-engine: ${FLOW_EXECUTOR_ENGINE:custom}
    # StateRecoveryJob 调度参数
    recovery-interval-ms: 30000
    recovery-initial-delay-ms: 60000
    worker-id: ${HOSTNAME:flow-recovery-1}

# 延迟加载配置
lazy-load:
  enabled: true
  base-url: ${LAZY_LOAD_BASE_URL:}
  timeout: 5000

logging:
  file:
    name: ${LOG_FILE:/tmp/ruleforge-executor.log}
  level:
    root: INFO
    com.ruleforge: DEBUG

# Actuator — /actuator/health 给 docker HEALTHCHECK 探活,prometheus 给
# Phase 1 监控(详见 CHANGELOG 5.0.0)暴露指标
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    db:
      enabled: true
    diskspace:
      enabled: true
  info:
    env:
      enabled: true
